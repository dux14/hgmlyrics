<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>HKN Lyrics — Letras de Hakuna Group Music</title>
    <meta
      name="description"
      content="Wiki de letras de canciones de Hakuna Group Music. Encuentra letras, filtra por álbum y disfruta offline."
    />
    <meta name="keywords" content="Hakuna, lyrics, letras, canciones, HGM, worship, música" />
    <meta name="author" content="Hakuna Group Music" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F0F0F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180x180.png" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts: self-hosted WOFF2 (latin, 3 pesos Montserrat + 3 Cormorant) -->
    <!-- Preload del peso critico del cuerpo (Montserrat 600) -->
    <link
      rel="preload"
      href="/fonts/montserrat-latin-600.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>
  <body>
    <!-- Sprite SVG global: gradiente y símbolo de corona fundadora -->
    <svg width="0" height="0" aria-hidden="true" style="position: absolute" focusable="false">
      <defs>
        <linearGradient id="founder-gold" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#FFE89A" />
          <stop offset=".45" stop-color="#FFD24A" />
          <stop offset="1" stop-color="#E8A317" />
        </linearGradient>
        <symbol id="founder-crown" viewBox="0 0 24 24">
          <path
            d="M12 6l4 6l5 -4l-2 10h-14l-2 -10l5 4z"
            fill="url(#founder-gold)"
            stroke="#B8860B"
            stroke-width="1.1"
            stroke-linejoin="round"
          />
          <circle cx="12" cy="5" r="1.5" fill="#FF7A9C" stroke="#B8860B" stroke-width=".7" />
        </symbol>
      </defs>
    </svg>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
